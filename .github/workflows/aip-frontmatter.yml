name: AIP Frontmatter Validation

on:
  pull_request:
    paths:
      - 'aips/**'

jobs:
  validate-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate AIP frontmatter
        run: node scripts/validate-frontmatter.mjs
